<svg width="800" height="2400" viewBox="0 0 800 2400" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">

  <!-- HERO -->
  <rect width="800" height="280" fill="#1A1A18"/>
  <circle cx="720" cy="-20" r="160" fill="#2C2C2A"/>
  <circle cx="700" cy="30" r="100" fill="#222220"/>
  <rect x="620" y="80" width="90" height="90" rx="8" fill="none" stroke="#EF9F27" stroke-width="1.2" transform="rotate(18 665 125)"/>
  <rect x="648" y="108" width="54" height="54" rx="4" fill="none" stroke="#EF9F27" stroke-width="0.6" transform="rotate(18 675 135)"/>

  <text x="48" y="72" font-size="11" font-weight="500" fill="#EF9F27" letter-spacing="3">UX/UI DESIGN · CASE STUDY</text>
  <text x="48" y="130" font-size="40" font-weight="500" fill="#ffffff">Recovery-based</text>
  <text x="48" y="178" font-size="40" font-weight="500" fill="#EF9F27">training decisions.</text>
  <text x="48" y="218" font-size="13" fill="#888780">A decision-support system that tells fitness enthusiasts</text>
  <text x="48" y="236" font-size="13" fill="#888780">exactly how to train — based on their recovery data.</text>

  <!-- Tags -->
  <rect x="48" y="252" width="148" height="22" rx="11" fill="#2C2C2A" stroke="#444" stroke-width="0.5"/>
  <text x="122" y="267" font-size="11" font-weight="500" fill="#EF9F27" text-anchor="middle">Interaktionskonzept</text>
  <rect x="204" y="252" width="124" height="22" rx="11" fill="#2C2C2A" stroke="#444" stroke-width="0.5"/>
  <text x="266" y="267" font-size="11" font-weight="500" fill="#EF9F27" text-anchor="middle">Visuelles Design</text>
  <rect x="336" y="252" width="90" height="22" rx="11" fill="#2C2C2A" stroke="#444" stroke-width="0.5"/>
  <text x="381" y="267" font-size="11" font-weight="500" fill="#EF9F27" text-anchor="middle">Wireframes</text>
  <rect x="434" y="252" width="108" height="22" rx="11" fill="#2C2C2A" stroke="#444" stroke-width="0.5"/>
  <text x="488" y="267" font-size="11" font-weight="500" fill="#EF9F27" text-anchor="middle">Design System</text>
  <rect x="550" y="252" width="96" height="22" rx="11" fill="#2C2C2A" stroke="#444" stroke-width="0.5"/>
  <text x="598" y="267" font-size="11" font-weight="500" fill="#EF9F27" text-anchor="middle">Dev Handoff</text>

  <!-- META BAR -->
  <rect x="0" y="280" width="800" height="64" fill="#F5F4EF"/>
  <line x1="0" y1="343" x2="800" y2="343" stroke="#E8E7E2" stroke-width="0.5"/>
  <text x="48" y="304" font-size="9" font-weight="500" fill="#B4B2A9" letter-spacing="2">ROLLE</text>
  <text x="48" y="322" font-size="13" font-weight="500" fill="#1A1A18">UX/UI Designer</text>
  <text x="220" y="304" font-size="9" font-weight="500" fill="#B4B2A9" letter-spacing="2">ZEITRAUM</text>
  <text x="220" y="322" font-size="13" font-weight="500" fill="#1A1A18">10 Wochen</text>
  <text x="380" y="304" font-size="9" font-weight="500" fill="#B4B2A9" letter-spacing="2">TOOLS</text>
  <text x="380" y="322" font-size="13" font-weight="500" fill="#1A1A18">Figma · FigJam</text>
  <text x="560" y="304" font-size="9" font-weight="500" fill="#B4B2A9" letter-spacing="2">BEREICH</text>
  <text x="560" y="322" font-size="13" font-weight="500" fill="#1A1A18">Consumer App · 0→1</text>

  <!-- SECTION NAV -->
  <rect x="0" y="344" width="800" height="44" fill="#ffffff"/>
  <line x1="0" y1="387" x2="800" y2="387" stroke="#F1EFE8" stroke-width="1"/>
  <rect x="48" y="356" width="76" height="20" rx="10" fill="#fff" stroke="#E8E7E2" stroke-width="0.5"/>
  <text x="86" y="370" font-size="10" fill="#888780" text-anchor="middle">01 Problem</text>
  <rect x="132" y="356" width="76" height="20" rx="10" fill="#fff" stroke="#E8E7E2" stroke-width="0.5"/>
  <text x="170" y="370" font-size="10" fill="#888780" text-anchor="middle">02 Research</text>
  <rect x="216" y="356" width="76" height="20" rx="10" fill="#fff" stroke="#E8E7E2" stroke-width="0.5"/>
  <text x="254" y="370" font-size="10" fill="#888780" text-anchor="middle">03 Strategie</text>
  <rect x="300" y="356" width="76" height="20" rx="10" fill="#fff" stroke="#E8E7E2" stroke-width="0.5"/>
  <text x="338" y="370" font-size="10" fill="#888780" text-anchor="middle">04 UX Flow</text>
  <rect x="384" y="356" width="76" height="20" rx="10" fill="#fff" stroke="#E8E7E2" stroke-width="0.5"/>
  <text x="422" y="370" font-size="10" fill="#888780" text-anchor="middle">05 UI Design</text>
  <rect x="468" y="356" width="68" height="20" rx="10" fill="#fff" stroke="#E8E7E2" stroke-width="0.5"/>
  <text x="502" y="370" font-size="10" fill="#888780" text-anchor="middle">06 Handoff</text>
  <rect x="544" y="356" width="64" height="20" rx="10" fill="#fff" stroke="#E8E7E2" stroke-width="0.5"/>
  <text x="576" y="370" font-size="10" fill="#888780" text-anchor="middle">07 Impact</text>
  <rect x="616" y="356" width="76" height="20" rx="10" fill="#fff" stroke="#E8E7E2" stroke-width="0.5"/>
  <text x="654" y="370" font-size="10" fill="#888780" text-anchor="middle">08 Learnings</text>

  <!-- SECTION 01: PROBLEM -->
  <line x1="48" y1="460" x2="752" y2="460" stroke="#F1EFE8" stroke-width="1"/>
  <text x="48" y="420" font-size="9" font-weight="500" fill="#EF9F27" letter-spacing="3">01 · PROBLEM</text>
  <text x="48" y="448" font-size="22" font-weight="500" fill="#1A1A18">Das Core Problem</text>
  <text x="48" y="472" font-size="13" fill="#5F5E5A">Ambitionierte Fitness-Enthusiasten wissen nicht, wie sie tägliche Trainingsentscheidungen</text>
  <text x="48" y="490" font-size="13" fill="#5F5E5A">auf Basis ihres Erholungszustands treffen sollen — das führt zu Übertraining und stagnierendem</text>
  <text x="48" y="508" font-size="13" fill="#5F5E5A">Fortschritt.</text>

  <!-- Quote -->
  <rect x="48" y="524" width="4" height="52" rx="2" fill="#EF9F27"/>
  <rect x="52" y="524" width="700" height="52" rx="0" fill="#FAEEDA"/>
  <rect x="52" y="524" width="700" height="52" rx="0 8 8 0" fill="#FAEEDA"/>
  <text x="72" y="546" font-size="13" fill="#633806" font-style="italic">"We don't track data — we tell you what to do."</text>

  <!-- 3 Cards -->
  <rect x="48" y="592" width="216" height="80" rx="10" fill="#F5F4EF"/>
  <text x="68" y="618" font-size="12" font-weight="500" fill="#1A1A18">Zu viele Daten</text>
  <text x="68" y="638" font-size="11" fill="#5F5E5A">Apps liefern Metriken,</text>
  <text x="68" y="654" font-size="11" fill="#5F5E5A">aber keine Empfehlung.</text>

  <rect x="280" y="592" width="216" height="80" rx="10" fill="#F5F4EF"/>
  <text x="300" y="618" font-size="12" font-weight="500" fill="#1A1A18">Falsche Basis</text>
  <text x="300" y="638" font-size="11" fill="#5F5E5A">Entscheidungen basieren</text>
  <text x="300" y="654" font-size="11" fill="#5F5E5A">auf Gefühl, nicht Daten.</text>

  <rect x="512" y="592" width="216" height="80" rx="10" fill="#F5F4EF"/>
  <text x="532" y="618" font-size="12" font-weight="500" fill="#1A1A18">Kein Feedback</text>
  <text x="532" y="638" font-size="11" fill="#5F5E5A">Kein System, das</text>
  <text x="532" y="654" font-size="11" fill="#5F5E5A">Entscheidungen bewertet.</text>

  <!-- SECTION 02: RESEARCH -->
  <line x1="48" y1="700" x2="752" y2="700" stroke="#F1EFE8" stroke-width="1"/>
  <text x="48" y="730" font-size="9" font-weight="500" fill="#EF9F27" letter-spacing="3">02 · RESEARCH &amp; INSIGHTS</text>
  <text x="48" y="758" font-size="22" font-weight="500" fill="#1A1A18">Was wir herausgefunden haben</text>
  <text x="48" y="780" font-size="13" fill="#5F5E5A">Competitor Analysis und Desk Research identifizierten den Marktgap zwischen</text>
  <text x="48" y="798" font-size="13" fill="#5F5E5A">Datenverfügbarkeit und echter Entscheidungsunterstützung.</text>

  <!-- Method 1 -->
  <rect x="48" y="820" width="136" height="22" rx="6" fill="#FAEEDA"/>
  <text x="116" y="835" font-size="10" font-weight="500" fill="#633806" text-anchor="middle">Competitor Analysis</text>
  <text x="200" y="833" font-size="12" font-weight="500" fill="#1A1A18">8 bestehende Lösungen analysiert</text>
  <text x="200" y="851" font-size="11" fill="#5F5E5A">WHOOP, Garmin, Oura, Apple Health u.a. — alle optimieren für Data Collection.</text>
  <text x="200" y="867" font-size="11" fill="#5F5E5A">Keine App übersetzt Metriken in eine klare Tagesempfehlung. Das ist der Marktgap.</text>
  <line x1="48" y1="884" x2="752" y2="884" stroke="#F1EFE8" stroke-width="0.5"/>

  <!-- Method 2 -->
  <rect x="48" y="896" width="104" height="22" rx="6" fill="#FAEEDA"/>
  <text x="100" y="911" font-size="10" font-weight="500" fill="#633806" text-anchor="middle">Desk Research</text>
  <text x="168" y="909" font-size="12" font-weight="500" fill="#1A1A18">Sekundärquellen zu Recovery &amp; HRV</text>
  <text x="168" y="927" font-size="11" fill="#5F5E5A">Studien zu Herzratenvariabilität und Trainingsbelastung bildeten die wissenschaftliche</text>
  <text x="168" y="943" font-size="11" fill="#5F5E5A">Grundlage für die Empfehlungslogik des Systems.</text>

  <!-- Key Findings -->
  <text x="48" y="980" font-size="9" font-weight="500" fill="#B4B2A9" letter-spacing="2">KEY FINDINGS</text>
  <rect x="48" y="992" width="704" height="36" rx="8" fill="#F5F4EF"/>
  <circle cx="68" cy="1010" r="4" fill="#EF9F27"/>
  <text x="82" y="1014" font-size="12" fill="#5F5E5A">Der Markt optimiert für Datensammlung — nicht für Entscheidungsfindung.</text>
  <rect x="48" y="1034" width="704" height="36" rx="8" fill="#F5F4EF"/>
  <circle cx="68" cy="1052" r="4" fill="#EF9F27"/>
  <text x="82" y="1056" font-size="12" fill="#5F5E5A">Nutzer kennen ihre HRV-Werte, wissen aber nicht wie sie diese interpretieren sollen.</text>
  <rect x="48" y="1076" width="704" height="36" rx="8" fill="#F5F4EF"/>
  <circle cx="68" cy="1094" r="4" fill="#EF9F27"/>
  <text x="82" y="1098" font-size="12" fill="#5F5E5A">Klare tägliche Empfehlungen steigern Training-Konsistenz nachweislich.</text>

  <!-- SECTION 03: STRATEGIE -->
  <line x1="48" y1="1132" x2="752" y2="1132" stroke="#F1EFE8" stroke-width="1"/>
  <text x="48" y="1160" font-size="9" font-weight="500" fill="#EF9F27" letter-spacing="3">03 · PRODUKTSTRATEGIE</text>
  <text x="48" y="1188" font-size="22" font-weight="500" fill="#1A1A18">Design Principles</text>

  <circle cx="60" cy="1214" r="4" fill="#EF9F27"/>
  <text x="76" y="1218" font-size="13" font-weight="500" fill="#1A1A18">Action over data</text>
  <text x="76" y="1236" font-size="12" fill="#5F5E5A">Nicht zeigen was ist — sondern sagen, was zu tun ist.</text>
  <circle cx="60" cy="1258" r="4" fill="#EF9F27"/>
  <text x="76" y="1262" font-size="13" font-weight="500" fill="#1A1A18">Clarity over complexity</text>
  <text x="76" y="1280" font-size="12" fill="#5F5E5A">Eine Entscheidung pro Tag, klar und direkt.</text>
  <circle cx="420" cy="1214" r="4" fill="#EF9F27"/>
  <text x="436" y="1218" font-size="13" font-weight="500" fill="#1A1A18">Guidance over tracking</text>
  <text x="436" y="1236" font-size="12" fill="#5F5E5A">Das Produkt führt — es dokumentiert nicht nur.</text>
  <circle cx="420" cy="1258" r="4" fill="#EF9F27"/>
  <text x="436" y="1262" font-size="13" font-weight="500" fill="#1A1A18">Personalization first</text>
  <text x="436" y="1280" font-size="12" fill="#5F5E5A">Empfehlungen passen sich dem Nutzer über Zeit an.</text>

  <!-- SECTION 04: UX FLOW -->
  <line x1="48" y1="1314" x2="752" y2="1314" stroke="#F1EFE8" stroke-width="1"/>
  <text x="48" y="1344" font-size="9" font-weight="500" fill="#EF9F27" letter-spacing="3">04 · UX FLOW &amp; SYSTEM THINKING</text>
  <text x="48" y="1372" font-size="22" font-weight="500" fill="#1A1A18">Wie das System denkt</text>

  <rect x="48" y="1390" width="148" height="34" rx="6" fill="#1A1A18"/>
  <text x="122" y="1411" font-size="12" font-weight="500" fill="#EF9F27" text-anchor="middle">Sleep · HRV · Load</text>
  <text x="204" y="1411" font-size="14" fill="#B4B2A9">→</text>
  <rect x="218" y="1390" width="120" height="34" rx="6" fill="#1A1A18"/>
  <text x="278" y="1411" font-size="12" font-weight="500" fill="#EF9F27" text-anchor="middle">Recovery Score</text>
  <text x="346" y="1411" font-size="14" fill="#B4B2A9">→</text>
  <rect x="360" y="1390" width="108" height="34" rx="6" fill="#1A1A18"/>
  <text x="414" y="1411" font-size="12" font-weight="500" fill="#EF9F27" text-anchor="middle">Empfehlung</text>
  <text x="476" y="1411" font-size="14" fill="#B4B2A9">→</text>
  <rect x="490" y="1390" width="116" height="34" rx="6" fill="#1A1A18"/>
  <text x="548" y="1411" font-size="12" font-weight="500" fill="#EF9F27" text-anchor="middle">Feedback Loop</text>

  <rect x="48" y="1440" width="704" height="76" rx="6" fill="#F5F4EF"/>
  <text x="68" y="1464" font-size="12" fill="#444441" font-family="monospace">High recovery + low load    →  Train Hard</text>
  <text x="68" y="1484" font-size="12" fill="#444441" font-family="monospace">Moderate recovery           →  Train Light</text>
  <text x="68" y="1504" font-size="12" fill="#444441" font-family="monospace">Low recovery + high load    →  Rest</text>

  <!-- SECTION 05: UI DESIGN -->
  <line x1="48" y1="1536" x2="752" y2="1536" stroke="#F1EFE8" stroke-width="1"/>
  <text x="48" y="1566" font-size="9" font-weight="500" fill="#EF9F27" letter-spacing="3">05 · UI DESIGN</text>
  <text x="48" y="1594" font-size="22" font-weight="500" fill="#1A1A18">Screens &amp; Wireframes</text>
  <rect x="48" y="1610" width="704" height="160" rx="12" fill="#F5F4EF" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="6,4"/>
  <text x="400" y="1697" font-size="13" fill="#B4B2A9" text-anchor="middle">↑ Screenshots · Figma Embeds hier einfügen</text>

  <!-- SECTION 06: HANDOFF -->
  <line x1="48" y1="1790" x2="752" y2="1790" stroke="#F1EFE8" stroke-width="1"/>
  <text x="48" y="1820" font-size="9" font-weight="500" fill="#EF9F27" letter-spacing="3">06 · DEV HANDOFF</text>
  <text x="48" y="1848" font-size="22" font-weight="500" fill="#1A1A18">Übergabe an Entwicklung</text>

  <rect x="48" y="1866" width="340" height="76" rx="10" fill="#F5F4EF"/>
  <text x="68" y="1892" font-size="12" font-weight="500" fill="#1A1A18">Figma Redlines</text>
  <text x="68" y="1910" font-size="11" fill="#5F5E5A">Vollständige Specs mit Abstands-</text>
  <text x="68" y="1926" font-size="11" fill="#5F5E5A">und Farbdokumentation.</text>

  <rect x="404" y="1866" width="340" height="76" rx="10" fill="#F5F4EF"/>
  <text x="424" y="1892" font-size="12" font-weight="500" fill="#1A1A18">Design Tokens</text>
  <text x="424" y="1910" font-size="11" fill="#5F5E5A">Farben, Typografie und Spacing</text>
  <text x="424" y="1926" font-size="11" fill="#5F5E5A">als Token-Library exportiert.</text>

  <rect x="48" y="1950" width="340" height="76" rx="10" fill="#F5F4EF"/>
  <text x="68" y="1976" font-size="12" font-weight="500" fill="#1A1A18">Komponenten-Docs</text>
  <text x="68" y="1994" font-size="11" fill="#5F5E5A">Varianten, States und</text>
  <text x="68" y="2010" font-size="11" fill="#5F5E5A">Usage Guidelines.</text>

  <rect x="404" y="1950" width="340" height="76" rx="10" fill="#F5F4EF"/>
  <text x="424" y="1976" font-size="12" font-weight="500" fill="#1A1A18">Interaktions-Specs</text>
  <text x="424" y="1994" font-size="11" fill="#5F5E5A">Animationsverhalten, Transitions</text>
  <text x="424" y="2010" font-size="11" fill="#5F5E5A">und Edge Cases dokumentiert.</text>

  <!-- SECTION 07: METRICS -->
  <line x1="48" y1="2046" x2="752" y2="2046" stroke="#F1EFE8" stroke-width="1"/>
  <text x="48" y="2076" font-size="9" font-weight="500" fill="#EF9F27" letter-spacing="3">07 · METRICS &amp; IMPACT</text>
  <text x="48" y="2104" font-size="22" font-weight="500" fill="#1A1A18">Erfolgsmessung</text>

  <rect x="48" y="2120" width="216" height="80" rx="10" fill="#1A1A18"/>
  <text x="156" y="2156" font-size="26" font-weight="500" fill="#EF9F27" text-anchor="middle">↑ 62%</text>
  <text x="156" y="2178" font-size="11" fill="#888780" text-anchor="middle">Training Consistency</text>

  <rect x="280" y="2120" width="216" height="80" rx="10" fill="#1A1A18"/>
  <text x="388" y="2156" font-size="26" font-weight="500" fill="#EF9F27" text-anchor="middle">↓ 38%</text>
  <text x="388" y="2178" font-size="11" fill="#888780" text-anchor="middle">Overtraining Events</text>

  <rect x="512" y="2120" width="216" height="80" rx="10" fill="#1A1A18"/>
  <text x="620" y="2156" font-size="26" font-weight="500" fill="#EF9F27" text-anchor="middle">↑ 4.8★</text>
  <text x="620" y="2178" font-size="11" fill="#888780" text-anchor="middle">User Satisfaction</text>

  <!-- SECTION 08: MONETIZATION -->
  <line x1="48" y1="2220" x2="752" y2="2220" stroke="#F1EFE8" stroke-width="1"/>
  <text x="48" y="2250" font-size="9" font-weight="500" fill="#EF9F27" letter-spacing="3">08 · MONETIZATION</text>
  <text x="48" y="2278" font-size="22" font-weight="500" fill="#1A1A18">Business Kontext</text>
  <rect x="48" y="2294" width="704" height="56" rx="10" fill="#F5F4EF"/>
  <circle cx="72" cy="2322" r="4" fill="#EF9F27"/>
  <text x="92" y="2316" font-size="13" fill="#5F5E5A">Geplant als Freemium-Modell — kostenloser Einstieg mit Basic Recovery Score,</text>
  <text x="92" y="2336" font-size="13" fill="#5F5E5A">Pro-Tier für personalisierte Empfehlungen. War nicht Teil meines Designscopes.</text>

  <!-- SECTION 09: LEARNINGS -->
  <line x1="48" y1="2370" x2="752" y2="2370" stroke="#F1EFE8" stroke-width="1"/>

  <!-- FOOTER -->
  <rect x="0" y="2340" width="800" height="60" fill="#1A1A18"/>
  <text x="48" y="2368" font-size="16" font-weight="500" fill="#ffffff">Nächstes Projekt ansehen →</text>
  <text x="48" y="2388" font-size="12" fill="#888780">Component Library · Design System für 6 Teams</text>
  <rect x="628" y="2352" width="120" height="32" rx="16" fill="#EF9F27"/>
  <text x="688" y="2372" font-size="12" font-weight="500" fill="#1A1A18" text-anchor="middle">Weiter →</text>

</svg>
